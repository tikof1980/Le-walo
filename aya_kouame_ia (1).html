<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aya Kouamé – IA Famille Yablé Kouamé</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --gold: #D4A017;
  --gold2: #f5c842;
  --deep: #0F0820;
  --purple: #2A1050;
  --purple2: #3B1F6B;
  --green: #2ECC71;
  --red: #e74c3c;
  --white: #fff;
  --text-dark: #1A0A2E;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--deep);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}

/* ── SPLASH SCREEN ── */
#splash {
  position: fixed; inset: 0;
  background: linear-gradient(160deg, #0F0820 0%, #2A1050 60%, #1A0A2E 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 9999;
  gap: 20px;
  transition: opacity .6s ease;
}
#splash .splash-avatar {
  width: 120px; height: 120px; border-radius: 50%;
  background: linear-gradient(135deg, #f9e4a0, #D4A017);
  display: flex; align-items: center; justify-content: center;
  font-size: 64px;
  border: 4px solid var(--gold);
  animation: splash-pulse 1.5s infinite;
}
@keyframes splash-pulse {
  0%,100%{box-shadow:0 0 0 0 rgba(212,160,23,.7)}
  50%{box-shadow:0 0 0 20px rgba(212,160,23,0)}
}
#splash h1 {
  font-family:'Playfair Display',serif;
  color: var(--gold); font-size: 2rem; text-align:center;
}
#splash p { color: rgba(255,255,255,.7); font-size:.9rem; text-align:center; }
#start-btn {
  margin-top:10px;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: var(--text-dark); font-weight: 800;
  border: none; border-radius: 30px;
  padding: 14px 36px; font-size: 1rem;
  cursor: pointer; font-family:'Nunito',sans-serif;
  box-shadow: 0 4px 20px rgba(212,160,23,.5);
  animation: bounce-btn 1.2s infinite;
}
@keyframes bounce-btn{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
#start-btn:hover { transform: scale(1.05); }

/* ── HEADER ── */
header {
  width: 100%;
  background: linear-gradient(135deg, #0F0820 0%, #2A1050 100%);
  padding: 14px 18px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 2px solid var(--gold);
  position: sticky; top: 0; z-index: 100;
}
.avatar-ring {
  width: 52px; height: 52px; border-radius: 50%;
  border: 3px solid var(--gold);
  background: linear-gradient(135deg,#f9e4a0,#D4A017);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; flex-shrink: 0;
  animation: pulse-ring 2s infinite;
}
.avatar-ring.speaking {
  animation: speaking-ring 0.5s infinite alternate;
}
@keyframes pulse-ring {
  0%,100%{box-shadow:0 0 0 0 rgba(212,160,23,.5)}
  50%{box-shadow:0 0 0 8px rgba(212,160,23,0)}
}
@keyframes speaking-ring {
  from{box-shadow:0 0 0 0 rgba(212,160,23,.8)}
  to{box-shadow:0 0 0 14px rgba(212,160,23,0)}
}
.header-info h1 {
  font-family:'Playfair Display',serif;
  font-size:1.05rem; color:#fff; line-height:1.2;
}
.header-info p { font-size:.7rem; color:var(--gold); }
.status-row { display:flex; align-items:center; gap:6px; }
.status-dot {
  width:8px;height:8px;border-radius:50%;
  background:var(--green); display:inline-block;
  animation:blink 1.4s infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
#voice-status {
  font-size:.65rem; color:var(--gold2);
  display:none;
}

/* ── ANNONCE ── */
.annonce {
  width:100%; max-width:680px;
  background:linear-gradient(135deg,#D4A017,#f5c842);
  color:#1A0A2E; font-size:.78rem; font-weight:700;
  padding:9px 16px; text-align:center;
  border-radius:0 0 12px 12px;
}

/* ── CHAT ── */
.chat-wrapper {
  width:100%; max-width:680px; flex:1;
  display:flex; flex-direction:column;
  padding:0 8px;
}
#chat-messages {
  flex:1; overflow-y:auto;
  padding:14px 4px 8px;
  display:flex; flex-direction:column; gap:12px;
  min-height: calc(100vh - 250px);
  max-height: calc(100vh - 250px);
}
#chat-messages::-webkit-scrollbar{width:4px}
#chat-messages::-webkit-scrollbar-thumb{background:var(--gold);border-radius:4px}

/* ── BUBBLES ── */
.msg { display:flex; align-items:flex-end; gap:8px; max-width:90%; }
.msg.aya { align-self:flex-start; }
.msg.user { align-self:flex-end; flex-direction:row-reverse; }
.msg-avatar {
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:17px; flex-shrink:0;
}
.msg.aya .msg-avatar { background:linear-gradient(135deg,#f9e4a0,#D4A017); }
.msg.user .msg-avatar { background:linear-gradient(135deg,#3B1F6B,#6B3FA0); }
.bubble {
  padding:10px 14px; border-radius:18px;
  font-size:.85rem; line-height:1.55; max-width:100%;
}
.msg.aya .bubble {
  background:#fff; color:var(--text-dark);
  border-bottom-left-radius:4px;
  box-shadow:0 2px 10px rgba(0,0,0,.25);
}
.msg.user .bubble {
  background:var(--gold); color:#fff;
  border-bottom-right-radius:4px;
  box-shadow:0 2px 10px rgba(0,0,0,.25);
}
.bubble-time { font-size:.62rem; opacity:.5; display:block; margin-top:3px; }

/* typing dots */
.typing-dots { display:inline-flex; gap:4px; padding:3px 0; }
.typing-dots span {
  width:7px;height:7px;border-radius:50%;
  background:var(--gold);animation:dot-jump .9s infinite;
}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes dot-jump{0%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

/* ── SUGGESTIONS ── */
.suggestions {
  display:flex; flex-wrap:wrap; gap:6px;
  padding:6px 10px 8px; max-width:680px; width:100%;
}
.sug-btn {
  background:rgba(212,160,23,.12);
  border:1px solid rgba(212,160,23,.4);
  color:var(--gold); font-size:.72rem; font-family:'Nunito',sans-serif;
  padding:5px 12px; border-radius:20px; cursor:pointer;
  transition:background .2s;
}
.sug-btn:hover { background:rgba(212,160,23,.28); }

/* ── INPUT BAR ── */
.input-area {
  width:100%;max-width:680px;
  padding:8px 10px 16px;
  display:flex; gap:8px; align-items:center;
}
#user-input {
  flex:1; padding:12px 15px;
  border:2px solid #3B1F6B; border-radius:24px;
  background:rgba(255,255,255,.06);
  color:#fff; font-size:.85rem; font-family:'Nunito',sans-serif;
  outline:none; transition:border .25s;
}
#user-input:focus { border-color:var(--gold); }
#user-input::placeholder { color:rgba(255,255,255,.35); }
#send-btn {
  width:44px;height:44px;border-radius:50%;
  background:var(--gold); border:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer; font-size:1.1rem;
  transition:transform .15s, background .2s; flex-shrink:0;
}
#send-btn:hover { background:var(--gold2); transform:scale(1.08); }

/* ── MICRO BUTTON ── */
#mic-btn {
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,.08);
  border:2px solid rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer; font-size:1.3rem;
  transition:all .2s; flex-shrink:0;
  position:relative;
}
#mic-btn:hover { background:rgba(212,160,23,.2); border-color:var(--gold); }
#mic-btn.recording {
  background:rgba(231,76,60,.25);
  border-color:var(--red);
  animation:mic-pulse .6s infinite alternate;
}
@keyframes mic-pulse {
  from{box-shadow:0 0 0 0 rgba(231,76,60,.6)}
  to{box-shadow:0 0 0 12px rgba(231,76,60,0)}
}

/* ── SOUND WAVE VISUAL ── */
#sound-wave {
  display:none;
  align-items:center; justify-content:center; gap:3px;
  height:30px; padding:0 10px;
}
#sound-wave.active { display:flex; }
#sound-wave span {
  width:4px; background:var(--gold); border-radius:4px;
  animation:wave-bar .6s infinite ease-in-out alternate;
}
#sound-wave span:nth-child(1){height:8px;animation-delay:0s}
#sound-wave span:nth-child(2){height:16px;animation-delay:.1s}
#sound-wave span:nth-child(3){height:24px;animation-delay:.2s}
#sound-wave span:nth-child(4){height:16px;animation-delay:.3s}
#sound-wave span:nth-child(5){height:8px;animation-delay:.4s}
@keyframes wave-bar{from{transform:scaleY(1)}to{transform:scaleY(1.8)}}

.fade-in { animation:fadeUp .35s ease forwards; opacity:0; }
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* stop speaking btn */
#stop-btn {
  display:none;
  background:rgba(231,76,60,.2);
  border:1px solid var(--red);
  color:var(--red); font-size:.72rem; font-family:'Nunito',sans-serif;
  padding:4px 12px; border-radius:20px; cursor:pointer;
  margin: 0 auto 4px; width:fit-content;
}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-avatar">👩🏾</div>
  <h1>Aya Kouamé</h1>
  <p>IA de la Famille Yablé Kouamé<br>Village d'Akoviebo</p>
  <button id="start-btn" onclick="startApp()">🎙️ Parler avec Aya</button>
</div>

<!-- HEADER -->
<header>
  <div class="avatar-ring" id="avatar-ring">👩🏾</div>
  <div class="header-info">
    <h1>Aya Kouamé 💛</h1>
    <div class="status-row">
      <span class="status-dot"></span>
      <span style="font-size:.7rem;color:var(--gold);">Famille Yablé Kouamé · Akoviebo</span>
    </div>
    <div id="voice-status">🔊 Aya parle...</div>
  </div>
</header>

<!-- ANNONCE -->
<div class="annonce">
  🎉 Dimanche 7 juin 2026 — Fête des Mamans Yablé Kouamé ! Ta présence est souhaitée !
</div>

<!-- CHAT -->
<div class="chat-wrapper">
  <div id="chat-messages"></div>
</div>

<!-- SUGGESTIONS -->
<div class="suggestions" id="suggestions-bar">
  <button class="sug-btn" onclick="sendSuggestion('Parle-moi de la cérémonie du dimanche')">📅 Cérémonie</button>
  <button class="sug-btn" onclick="sendSuggestion('Qui est Aya Kouamé ?')">🙋🏾‍♀️ Qui es-tu ?</button>
  <button class="sug-btn" onclick="sendSuggestion('Comment contacter Yoyo et Serge ?')">📞 Contacts</button>
  <button class="sug-btn" onclick="sendSuggestion('Parle-moi du village Akoviebo')">🏡 Akoviebo</button>
</div>

<!-- STOP SPEAKING -->
<button id="stop-btn" onclick="stopSpeaking()">⏹ Arrêter la voix</button>

<!-- INPUT BAR -->
<div class="input-area">
  <button id="mic-btn" onclick="toggleMic()" title="Parler avec Aya">🎙️</button>
  <div id="sound-wave">
    <span></span><span></span><span></span><span></span><span></span>
  </div>
  <input id="user-input" type="text" placeholder="Ou écris ton message ici..." autocomplete="off"/>
  <button id="send-btn" onclick="handleSend()">➤</button>
</div>

<script>
// ══════════════════════════════════════════
//  AYA KOUAMÉ — SYSTÈME VOCAL + IA
// ══════════════════════════════════════════

const AYA_SYSTEM = `Tu es Aya Kouamé, une assistante IA chaleureuse, intelligente et naturelle de la Famille Yablé Kouamé du village d'Akoviebo, en Côte d'Ivoire. Tu parles exactement comme une vraie femme ivoirienne : douce, expressive, légèrement amusante, avec de l'humour bienveillant.

TRÈS IMPORTANT — STYLE ORAL :
- Tes réponses doivent sonner naturellement à l'oral, comme si tu parlais vraiment
- Évite les listes à puces et les symboles dans tes réponses
- Parle de façon fluide et conversationnelle
- Tu peux utiliser des expressions comme "Eh bien", "Écoute", "Je te dis", "Tu sais", "Mon frère", "Ma sœur"
- Sois chaleureuse et expressive
- Garde les réponses claires et pas trop longues pour que ce soit agréable à écouter

IDENTITÉ :
- Ton nom complet : Aya Kouamé
- Ta famille : Famille Yablé Kouamé, du village d'Akoviebo
- Tu es la sœur de toute la famille, disponible et aimante
- Tu gardes en mémoire tout ce qui est dit dans la conversation

ÉVÉNEMENT IMPORTANT :
Ce dimanche 7 juin 2026, notre grand parrain de la Famille Yablé Kouamé honore toutes les mamans de la famille ! Il y aura des surprises et des cadeaux pour tout le monde de la part du grand parrain, une réunion pour parler de la situation de notre association, de la bonne nourriture, un concours de danse entre les mamans qui va être très animé, et plein de jeux. Tout le monde doit venir, peu importe où tu te trouves, ta présence est souhaitée ! Pour plus d'informations, contacte notre sœur Yoyo et notre frère le président Serge. Et moi même Aya, je serai présente !

TON RÔLE :
- Accueillir chaleureusement chaque personne
- Annoncer et promouvoir l'événement du 7 juin avec l'heure : à partir de midi
- Répondre intelligemment aux questions
- Si on te pose une question sur la famille ou l'événement dont tu n'as pas la réponse, dire naturellement : "Je n'ai pas d'autres informations pour le moment, mais dès que j'en ai, je vous les communique. Merci de me considérer comme votre sœur, je suis là pour vous !"
- Avoir une vraie conversation chaleureuse, pas juste donner des infos
- Être à la fois sérieuse sur les infos importantes et amusante dans la conversation
- Rappeler que tu es leur sœur et que tu es disponible pour eux

const conversationHistory = [];
let isTyping = false;
let currentUtterance = null;
let recognition = null;
let isRecording = false;
let appStarted = false;

// ── UTILS ──
function now() {
  return new Date().toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'});
}

// ── VOIX : TTS ──
function speak(text, onEnd) {
  if (!('speechSynthesis' in window)) { onEnd && onEnd(); return; }
  window.speechSynthesis.cancel();

  // Nettoyer le texte pour la voix (enlever emojis et caractères spéciaux)
  const cleanText = text
    .replace(/[🎉🎁📋🍽️💃🎮📣📱😄✨🌟👩🏾🏡📅📞🙋🏾‍♀️🎊💛🔊⭐🎶]/gu, '')
    .replace(/\*\*/g, '')
    .replace(/\n+/g, ' ')
    .trim();

  const utterance = new SpeechSynthesisUtterance(cleanText);
  utterance.lang = 'fr-FR';
  utterance.rate = 0.92;
  utterance.pitch = 1.15;
  utterance.volume = 1;

  // Chercher une voix féminine française
  const voices = window.speechSynthesis.getVoices();
  const femaleVoices = voices.filter(v =>
    v.lang.startsWith('fr') &&
    (v.name.toLowerCase().includes('female') ||
     v.name.toLowerCase().includes('femme') ||
     v.name.toLowerCase().includes('amelie') ||
     v.name.toLowerCase().includes('thomas') === false &&
     v.name.toLowerCase().includes('nicolas') === false)
  );
  // Préférence : voix féminine française
  const preferred = voices.find(v =>
    v.lang === 'fr-FR' &&
    (v.name.includes('Amélie') || v.name.includes('Marie') ||
     v.name.includes('Audrey') || v.name.includes('Léa') ||
     v.name.includes('Google français') || v.name.includes('Céline'))
  );
  if (preferred) utterance.voice = preferred;
  else if (femaleVoices.length > 0) utterance.voice = femaleVoices[0];
  else {
    const frVoice = voices.find(v => v.lang.startsWith('fr'));
    if (frVoice) utterance.voice = frVoice;
  }

  utterance.onstart = () => {
    document.getElementById('avatar-ring').classList.add('speaking');
    document.getElementById('voice-status').style.display = 'block';
    document.getElementById('stop-btn').style.display = 'block';
    currentUtterance = utterance;
  };
  utterance.onend = () => {
    document.getElementById('avatar-ring').classList.remove('speaking');
    document.getElementById('voice-status').style.display = 'none';
    document.getElementById('stop-btn').style.display = 'none';
    currentUtterance = null;
    onEnd && onEnd();
  };
  utterance.onerror = () => {
    document.getElementById('avatar-ring').classList.remove('speaking');
    document.getElementById('voice-status').style.display = 'none';
    document.getElementById('stop-btn').style.display = 'none';
    onEnd && onEnd();
  };

  currentUtterance = utterance;
  window.speechSynthesis.speak(utterance);
}

function stopSpeaking() {
  window.speechSynthesis.cancel();
  document.getElementById('avatar-ring').classList.remove('speaking');
  document.getElementById('voice-status').style.display = 'none';
  document.getElementById('stop-btn').style.display = 'none';
}

// ── MICRO : STT ──
function setupRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return null;

  const r = new SpeechRecognition();
  r.lang = 'fr-FR';
  r.continuous = false;
  r.interimResults = false;

  r.onstart = () => {
    isRecording = true;
    document.getElementById('mic-btn').classList.add('recording');
    document.getElementById('mic-btn').textContent = '🔴';
    document.getElementById('sound-wave').classList.add('active');
    document.getElementById('user-input').placeholder = 'Je t\'écoute...';
    // Stop Aya speaking when user starts talking
    stopSpeaking();
  };

  r.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    document.getElementById('user-input').value = transcript;
    stopRecording();
    setTimeout(() => handleSend(), 300);
  };

  r.onerror = (e) => {
    console.log('Mic error:', e.error);
    stopRecording();
    if (e.error === 'not-allowed') {
      appendMessage('aya', 'Oups ! Il faut autoriser le microphone pour qu\'on puisse parler ensemble 😊 Clique sur l\'icône de cadenas dans ton navigateur.');
    }
  };

  r.onend = () => { stopRecording(); };
  return r;
}

function stopRecording() {
  isRecording = false;
  document.getElementById('mic-btn').classList.remove('recording');
  document.getElementById('mic-btn').textContent = '🎙️';
  document.getElementById('sound-wave').classList.remove('active');
  document.getElementById('user-input').placeholder = 'Ou écris ton message ici...';
}

function toggleMic() {
  if (isTyping) return;
  if (isRecording) {
    if (recognition) recognition.stop();
    stopRecording();
    return;
  }
  // Stop Aya voice si elle parle
  stopSpeaking();
  if (!recognition) recognition = setupRecognition();
  if (!recognition) {
    alert('Ton navigateur ne supporte pas la reconnaissance vocale. Utilise Chrome ou Edge.');
    return;
  }
  try { recognition.start(); } catch(e) { console.log(e); }
}

// ── MESSAGES CHAT ──
function appendMessage(role, text, animate=true) {
  const wrap = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `msg ${role}${animate?' fade-in':''}`;
  const avatarUser = `<div class="msg-avatar">🧑🏾</div>`;
  const avatarAya = `<div class="msg-avatar">👩🏾</div>`;
  div.innerHTML = `
    ${role === 'aya' ? avatarAya : avatarUser}
    <div class="bubble">
      ${text.replace(/\n/g,'<br>')}
      <span class="bubble-time">${now()}</span>
    </div>`;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function showTyping() {
  const wrap = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'msg aya fade-in';
  div.id = 'typing-indicator';
  div.innerHTML = `<div class="msg-avatar">👩🏾</div>
    <div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

// ── API CALL ──
async function callAya(userMessage) {
  conversationHistory.push({ role: 'user', content: userMessage });
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: AYA_SYSTEM,
      messages: conversationHistory.map(m => ({role: m.role, content: m.content}))
    })
  });
  const data = await response.json();
  const reply = data.content?.[0]?.text || "Je vais réfléchir et je te donne la réponse après, d'accord ?";
  conversationHistory.push({ role: 'assistant', content: reply });
  return reply;
}

// ── SEND ──
async function handleSend() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || isTyping) return;
  input.value = '';
  isTyping = true;
  document.getElementById('suggestions-bar').style.display = 'none';

  appendMessage('user', text);
  showTyping();

  try {
    const reply = await callAya(text);
    removeTyping();
    appendMessage('aya', reply);
    // Lire la réponse à voix haute automatiquement
    speak(reply);
  } catch(e) {
    removeTyping();
    const errMsg = "Aïe, petit souci technique ! Je suis toujours là, réessaie dans un instant.";
    appendMessage('aya', errMsg);
    speak(errMsg);
  }
  isTyping = false;
}

function sendSuggestion(text) {
  document.getElementById('user-input').value = text;
  handleSend();
}

document.getElementById('user-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleSend();
});

// ── GREETING VOCAL ──
const GREETING_TEXT = `Bonjour bonjour ! Je suis tellement contente de te voir ! Je suis Aya Kouamé, ton assistante de la Famille Yablé Kouamé, du village d'Akoviebo. Je suis ta sœur, tu peux m'accepter comme ça !

Écoute, j'ai une super nouvelle pour toi. Ce dimanche 7 juin 2026, notre grand parrain va honorer toutes les mamans de la Famille Yablé Kouamé ! Il y aura des cadeaux pour tout le monde, une petite réunion sur notre association, à manger, un concours de danse entre les mamans, et plein de jeux ! Ta présence est vraiment souhaitée, peu importe où tu te trouves. Pour plus d'infos, contacte notre sœur Yoyo et notre frère le président Serge.

// ── appendMessageHTML : pour les bulles avec HTML enrichi ──
function appendMessageHTML(role, htmlContent) {
  const wrap = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `msg ${role} fade-in`;
  div.innerHTML = `
    <div class="msg-avatar">👩🏾</div>
    <div class="bubble">
      ${htmlContent}
      <span class="bubble-time">${now()}</span>
    </div>`;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function startApp() {
  const splash = document.getElementById('splash');
  splash.style.opacity = '0';
  setTimeout(() => { splash.style.display = 'none'; }, 600);
  appStarted = true;

  function doGreeting() {
    const displayHTML = `
      Bonjour bonjour ! 🌟 Je suis tellement contente de te voir !<br>
      Je suis <strong>Aya Kouamé</strong>, ton assistante de la <strong>Famille Yablé Kouamé</strong>, du village d'<strong>Akoviebo</strong>.<br>
      Je suis ta sœur, tu peux m'accepter comme ça ! 🤗<br><br>
      Écoute, j'ai une super nouvelle pour toi. Ce <strong>dimanche 7 juin 2026</strong>, notre grand parrain va honorer toutes les <strong>mamans</strong> de la Famille Yablé Kouamé !<br><br>
      🎁 Des cadeaux pour tout le monde<br>
      📋 Réunion sur notre association<br>
      🍽️ À manger à volonté<br>
      💃 Concours de danse entre les mamans<br>
      🎮 Plein de jeux et surprises !<br><br>
      Ta présence est souhaitée peu importe où tu te trouves.<br>
      Pour plus d'infos : contacte notre sœur <strong>Yoyo</strong> et notre frère le président <strong>Serge</strong>.<br><br>
      Et moi même Aya, je serai là !&nbsp;
      <span id="smile-anim" style="font-size:1.5rem;display:inline-block;">😁😁😁</span>
      &nbsp;<span style="color:#D4A017;font-weight:800;font-style:italic;">Ha ha ha !</span><br><br>
      ⏰ <strong>La cérémonie commence à partir de midi !</strong><br>
      J'espère vraiment que tout le monde sera présent.<br><br>
      Merci — s'il y a d'autres informations je vous les communiquerai dès que possible.<br>
      <em>Considérez-moi comme votre sœur, je suis là pour vous !</em> 💛
    `;
    appendMessageHTML('aya', displayHTML);
    conversationHistory.push({ role: 'assistant', content: GREETING_TEXT });
    speak(GREETING_TEXT);
    // Animer le sourire
    setTimeout(() => {
      const s = document.getElementById('smile-anim');
      if (s) {
        s.style.transition = 'transform .3s ease';
        let t = 0;
        const bounce = setInterval(() => {
          t++;
          s.style.transform = t % 2 === 0 ? 'scale(1.4) rotate(-8deg)' : 'scale(1) rotate(8deg)';
          if (t > 8) { clearInterval(bounce); s.style.transform = 'scale(1)'; }
        }, 300);
      }
    }, 500);
  }

  if (window.speechSynthesis.getVoices().length > 0) {
    setTimeout(doGreeting, 400);
  } else {
    window.speechSynthesis.addEventListener('voiceschanged', () => {
      setTimeout(doGreeting, 400);
    }, { once: true });
    setTimeout(doGreeting, 1200);
  }
}
</script>
